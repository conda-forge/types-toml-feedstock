{% set version = "0.10.8.20260508" %}


package:
  name: types-toml
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/types-toml/types_toml-{{ version }}.tar.gz
  sha256: 93aaa72365bd9bc8c2ce1ca3502b0470d8d428376bada020e1a4956b8b82fdda

build:
  number: 0
  noarch: python
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - test -f $SP_DIR/toml-stubs/__init__.pyi

about:
  home: https://github.com/python/typeshed
  summary: Typing stubs for toml
  license: Apache-2.0 AND MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - fhoehle
    - conda-forge/mypy
